<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBRA R-25 — Diario</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
    --border:#2e2e2e;--accent:#f5a623;--green:#22c55e;
    --red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
    --text:#f0f0f0;--text2:#888;--text3:#444;
    --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Bebas Neue',cursive;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--display);font-size:20px;letter-spacing:2px;color:var(--accent);}
  .logo span{color:var(--text2);font-size:11px;font-family:var(--mono);margin-left:10px;}
  .clock{font-family:var(--mono);font-size:11px;color:var(--text2);text-align:right;line-height:1.6;}

  /* NAV TABS */
  .nav-tabs{display:flex;gap:4px;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;}
  .nav-tab{padding:8px 16px;border:1px solid var(--border);border-radius:7px;background:none;color:var(--text2);font-family:var(--mono);font-size:11px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
  .nav-tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
  .nav-tab:hover:not(.active){border-color:var(--accent);color:var(--accent);}

  .panel{display:none;} .panel.active{display:block;}
  main{max-width:700px;margin:0 auto;padding:20px 16px;}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
  .stat .n{font-family:var(--display);font-size:32px;color:var(--accent);line-height:1;}
  .stat .l{font-size:10px;font-family:var(--mono);color:var(--text2);margin-top:3px;letter-spacing:1px;text-transform:uppercase;}

  /* FORM */
  .form-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
  .form-title{font-family:var(--display);font-size:18px;letter-spacing:1px;color:var(--accent);margin-bottom:16px;}
  .form-group{margin-bottom:14px;}
  .form-group:last-child{margin-bottom:0;}
  label{display:block;font-size:10px;font-family:var(--mono);color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}

  input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:14px;padding:10px 12px;outline:none;transition:border-color 0.2s;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}
  input::placeholder,textarea::placeholder{color:var(--text3);font-family:var(--mono);}
  select option{background:var(--surface2);}
  textarea{resize:vertical;min-height:70px;font-size:13px;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  /* TIPO */
  .tipo-selector{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .tipo-btn{padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text2);font-family:var(--mono);font-size:12px;cursor:pointer;text-align:center;transition:all 0.2s;letter-spacing:1px;}
  .tipo-btn.active-contrato{background:rgba(34,197,94,0.15);border-color:var(--green);color:var(--green);}
  .tipo-btn.active-hora{background:rgba(59,130,246,0.15);border-color:var(--blue);color:var(--blue);}

  /* OPERAI TAGS */
  .operai-container{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px;min-height:44px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;cursor:text;transition:border-color 0.2s;}
  .operai-container:focus-within{border-color:var(--accent);}
  .operaio-tag{background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.4);color:var(--accent);padding:4px 8px;border-radius:5px;font-size:12px;font-family:var(--mono);display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .operaio-tag .rm{cursor:pointer;color:var(--text2);font-size:14px;line-height:1;transition:color 0.2s;}
  .operaio-tag .rm:hover{color:var(--red);}
  .operai-input{background:none;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:13px;padding:2px 4px;min-width:120px;flex:1;}
  .operai-hint{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px;}

  /* DROPDOWN SUGGERIMENTI */
  .suggest-box{position:relative;}
  .suggest-list{display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--accent);border-radius:7px;z-index:50;max-height:180px;overflow-y:auto;margin-top:2px;}
  .suggest-item{padding:9px 12px;font-size:13px;font-family:var(--mono);cursor:pointer;transition:background 0.15s;border-bottom:1px solid var(--border);}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:hover{background:rgba(245,166,35,0.1);color:var(--accent);}

  .horas-field{display:none;}
  .horas-field.visible{display:block;}

  /* BOTTONI */
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
  .btn{padding:12px;border:none;border-radius:8px;font-family:var(--display);font-size:16px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
  .btn-save{background:var(--accent);color:#000;}
  .btn-save:hover{opacity:0.85;transform:translateY(-1px);}
  .btn-clear{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
  .btn-clear:hover{border-color:var(--text2);color:var(--text);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

  .notifica{display:none;padding:10px 14px;border-radius:7px;font-size:12px;font-family:var(--mono);margin-top:12px;}
  .notifica.ok{background:rgba(34,197,94,0.12);border:1px solid var(--green);color:var(--green);display:block;}
  .notifica.err{background:rgba(239,68,68,0.12);border:1px solid var(--red);color:var(--red);display:block;}

  /* LISTA */
  .lista-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .lista-title{font-family:var(--display);font-size:16px;letter-spacing:1px;color:var(--text2);}
  .refresh-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:6px;font-size:11px;font-family:var(--mono);cursor:pointer;transition:all 0.2s;}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

  .filtro-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
  .filtro-bar input[type="date"]{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 12px;outline:none;}
  .filtro-bar input:focus{border-color:var(--accent);}
  .btn-filtro{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:7px;font-size:11px;font-family:var(--mono);cursor:pointer;white-space:nowrap;transition:all 0.2s;}
  .btn-filtro:hover,.btn-filtro.active{border-color:var(--accent);color:var(--accent);}

  .diario-list{display:flex;flex-direction:column;gap:10px;}
  .diario-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color 0.2s;}
  .diario-row:hover{border-color:var(--accent);}
  .diario-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .diario-empresa{font-family:var(--display);font-size:16px;letter-spacing:1px;color:var(--accent);}
  .diario-fecha{font-family:var(--mono);font-size:11px;color:var(--text2);}
  .diario-trabajo{font-size:13px;color:var(--text);margin-bottom:6px;}
  .diario-footer{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-family:var(--mono);letter-spacing:1px;}
  .tag-contrato{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
  .tag-hora{background:rgba(59,130,246,0.12);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}
  .tag-operaio{background:rgba(245,166,35,0.1);color:var(--accent);border:1px solid rgba(245,166,35,0.2);}
  .diario-notas{font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:6px;font-style:italic;}

  #btn-eliminar-row{display:none;margin-top:10px;}
  #btn-eliminar-row button{width:100%;background:#1a1a1a;color:var(--red);border:1px solid var(--red);font-family:var(--display);font-size:16px;letter-spacing:2px;padding:12px;border-radius:8px;cursor:pointer;transition:all 0.2s;}
  #btn-eliminar-row button:hover{background:rgba(239,68,68,0.1);}

  /* GESTIONE CATALOGO */
  .catalogo-section{margin-bottom:20px;}
  .catalogo-empresa{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .catalogo-empresa-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.2s;}
  .catalogo-empresa-header:hover{background:var(--surface2);}
  .catalogo-empresa-name{font-family:var(--display);font-size:16px;letter-spacing:1px;color:var(--accent);}
  .catalogo-empresa-count{font-family:var(--mono);font-size:11px;color:var(--text2);}
  .catalogo-operarios{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:8px;}
  .catalogo-operario-tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;font-family:var(--mono);color:var(--text);display:flex;align-items:center;gap:8px;}
  .catalogo-operario-tag .rm-op{cursor:pointer;color:var(--text3);transition:color 0.2s;}
  .catalogo-operario-tag .rm-op:hover{color:var(--red);}

  .add-row{display:flex;gap:8px;margin-top:8px;}
  .add-row input{flex:1;}
  .btn-add{padding:10px 16px;background:var(--accent);color:#000;border:none;border-radius:7px;font-family:var(--display);font-size:14px;letter-spacing:1px;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;}
  .btn-add:hover{opacity:0.85;}
  .btn-add-empresa{width:100%;padding:12px;background:none;border:1px dashed var(--border);color:var(--text2);border-radius:8px;font-family:var(--mono);font-size:12px;cursor:pointer;transition:all 0.2s;margin-top:10px;letter-spacing:1px;}
  .btn-add-empresa:hover{border-color:var(--accent);color:var(--accent);}

  .empty-state{text-align:center;padding:32px;color:var(--text3);font-family:var(--mono);font-size:12px;border:1px dashed var(--border);border-radius:10px;}
  .loading{text-align:center;padding:24px;color:var(--text2);font-family:var(--mono);font-size:12px;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  @media(max-width:540px){.grid2{grid-template-columns:1fr;}.filtro-bar{flex-wrap:wrap;}}
</style>
</head>
<body>

<header>
  <div class="logo">OBRA R-25 <span>// DIARIO</span></div>
  <div class="clock" id="clock"></div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="showPanel('registro')">📒 REGISTRO</button>
  <button class="nav-tab" onclick="showPanel('lista')">📋 LISTA</button>
  <button class="nav-tab" onclick="showPanel('gestion'); cargarCatalogo()">⚙️ GESTIÓN</button>
</div>

<!-- PANEL REGISTRO -->
<div class="panel active" id="panel-registro">
<main>
  <div class="stats">
    <div class="stat"><div class="n" id="sGrupos">0</div><div class="l">Grupos hoy</div></div>
    <div class="stat"><div class="n" id="sOperarios">0</div><div class="l">Operarios</div></div>
    <div class="stat"><div class="n" id="sHoras">0h</div><div class="l">Horas extra</div></div>
  </div>

  <div class="form-card">
    <div class="form-title">📒 Nuevo Registro</div>

    <div class="grid2" style="margin-bottom:14px">
      <div class="form-group" style="margin:0">
        <label>Fecha</label>
        <input type="date" id="f-fecha">
      </div>
      <div class="form-group" style="margin:0">
        <label>Empresa (ditta)</label>
        <div class="suggest-box">
          <input type="text" id="f-empresa" placeholder="Seleziona o scrivi..." autocomplete="off" oninput="filterEmpresas(this.value)" onfocus="filterEmpresas(this.value)">
          <div class="suggest-list" id="suggest-empresa"></div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Trabajadores — premi Invio o virgola per aggiungere</label>
      <div class="operai-container" id="operai-container" onclick="document.getElementById('operai-input').focus()">
        <input type="text" id="operai-input" class="operai-input" placeholder="Seleziona o scrivi nome...">
      </div>
      <div class="suggest-box" style="position:relative">
        <div class="suggest-list" id="suggest-operario" style="top:0"></div>
      </div>
      <div class="operai-hint">↵ Invio o , per aggiungere · clicca × per rimuovere</div>
    </div>

    <div class="form-group">
      <label>Trabajo realizado</label>
      <textarea id="f-trabajo" placeholder="es: Realización pozo V5, Encofrado muro norte..."></textarea>
    </div>

    <div class="form-group">
      <label>Tipo de trabajo</label>
      <div class="tipo-selector">
        <div class="tipo-btn active-contrato" id="btn-contrato" onclick="setTipo('contrato')">✓ CONTRATO</div>
        <div class="tipo-btn" id="btn-hora" onclick="setTipo('hora')">⏱ POR HORA</div>
      </div>
    </div>

    <div class="form-group horas-field" id="horas-field">
      <label>Horas trabajadas</label>
      <input type="number" id="f-horas" placeholder="8" min="0" step="0.5">
    </div>

    <div class="form-group">
      <label>Notas</label>
      <input type="text" id="f-notas" placeholder="Opcional...">
    </div>

    <div class="btn-row">
      <button class="btn btn-clear" onclick="limpiar()">LIMPIAR</button>
      <button class="btn btn-save" id="btn-save" onclick="guardar()">GUARDAR</button>
    </div>
    <div id="btn-eliminar-row">
      <button onclick="eliminar()">🗑 ELIMINAR REGISTRO</button>
    </div>
    <div class="notifica" id="notif"></div>
  </div>
</main>
</div>

<!-- PANEL LISTA -->
<div class="panel" id="panel-lista">
<main>
  <div class="lista-header">
    <div class="lista-title">Registros</div>
    <button class="refresh-btn" onclick="cargarLista()">↻ Actualizar</button>
  </div>
  <div class="filtro-bar">
    <input type="date" id="filtro-fecha">
    <button class="btn-filtro active" id="btn-hoy" onclick="filtroHoy()">HOY</button>
    <button class="btn-filtro" id="btn-todos" onclick="filtroTodos()">TODOS</button>
  </div>
  <div class="diario-list" id="lista">
    <div class="loading">Cargando...</div>
  </div>
</main>
</div>

<!-- PANEL GESTIÓN -->
<div class="panel" id="panel-gestion">
<main>
  <div class="form-card">
    <div class="form-title">⚙️ Gestión de Empresas y Operarios</div>
    <div class="catalogo-section" id="catalogo-section">
      <div class="loading">Cargando catálogo...</div>
    </div>
    <button class="btn-add-empresa" onclick="addEmpresaForm()">+ AÑADIR NUEVA EMPRESA</button>
    <div id="nueva-empresa-form" style="display:none; margin-top:12px;">
      <div class="add-row">
        <input type="text" id="nueva-empresa-input" placeholder="Nombre de la empresa...">
        <button class="btn-add" onclick="guardarEmpresa()">AÑADIR</button>
      </div>
    </div>
    <div class="notifica" id="notif-gestion"></div>
  </div>
</main>
</div>

<script>
const N8N = 'https://demon8n-n8n.cup5ta.easypanel.host/webhook';
const WH_SAVE     = N8N + '/diario-save';
const WH_LIST     = N8N + '/diario-lista';
const WH_DELETE   = N8N + '/diario-eliminar';
const WH_CAT_LIST = N8N + '/catalogo-lista';
const WH_CAT_SAVE = N8N + '/catalogo-save';
const WH_CAT_DEL  = N8N + '/catalogo-eliminar';

let tipoAttivo = 'contrato';
let operaiList = [];
let rigaSelezionata = null;
let mostraTutti = false;
let catalogo = []; // [{Empresa, Operario}]

// ── OROLOGIO ──
function updateClock() {
  const d = new Date();
  document.getElementById('clock').innerHTML =
    d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}).toUpperCase() +
    '<br>' + d.toTimeString().slice(0,5);
}
setInterval(updateClock,1000); updateClock();

function inputToDate(d) { if(!d||d.includes('/')) return d||''; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function dateToInput(d) { if(!d||d.includes('-')) return d||''; const [dd,m,y]=d.split('/'); return `${y}-${m}-${dd}`; }

// ── NAV ──
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  event.target.classList.add('active');
  if(name==='lista') cargarLista();
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('f-fecha').value = hoy;
  document.getElementById('filtro-fecha').value = hoy;
  initOperaiInput();
  cargarCatalogo();
  cargarLista();

  document.getElementById('filtro-fecha').addEventListener('change', () => {
    mostraTutti = false;
    document.getElementById('btn-hoy').classList.remove('active');
    document.getElementById('btn-todos').classList.remove('active');
    cargarLista();
  });

  // Chiudi suggerimenti cliccando fuori
  document.addEventListener('click', e => {
    if (!e.target.closest('.suggest-box') && !e.target.closest('.operai-container')) {
      document.querySelectorAll('.suggest-list').forEach(s=>s.style.display='none');
    }
  });
});

// ── CARICA CATALOGO ──
async function cargarCatalogo() {
  try {
    const res = await fetch(WH_CAT_LIST, { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    const data = await res.json();
    catalogo = Array.isArray(data) ? data : [];
    renderCatalogo();
  } catch(e) {
    catalogo = [];
    renderCatalogo();
  }
}

// ── EMPRESA SUGGEST ──
function filterEmpresas(val) {
  const box = document.getElementById('suggest-empresa');
  const empresas = [...new Set(catalogo.map(c=>c.Empresa))].filter(e=>e.toLowerCase().includes(val.toLowerCase()));
  if (!empresas.length) { box.style.display='none'; return; }
  box.innerHTML = empresas.map(e=>`<div class="suggest-item" onclick="selectEmpresa('${e}')">${e}</div>`).join('');
  box.style.display = 'block';
}

function selectEmpresa(empresa) {
  document.getElementById('f-empresa').value = empresa;
  document.getElementById('suggest-empresa').style.display = 'none';
  // Mostra operai di questa empresa
  filterOperarios('', empresa);
}

// ── OPERAI INPUT ──
function initOperaiInput() {
  const input = document.getElementById('operai-input');
  input.addEventListener('keydown', e => {
    if ((e.key==='Enter'||e.key===',') && input.value.trim()) {
      e.preventDefault();
      aggiungiOperaio(input.value.replace(',','').trim());
      input.value='';
      document.getElementById('suggest-operario').style.display='none';
    } else if (e.key==='Backspace' && !input.value && operaiList.length>0) {
      rimuoviOperaio(operaiList.length-1);
    }
  });
  input.addEventListener('input', () => {
    const empresa = document.getElementById('f-empresa').value;
    filterOperarios(input.value, empresa);
  });
  input.addEventListener('focus', () => {
    const empresa = document.getElementById('f-empresa').value;
    filterOperarios(input.value, empresa);
  });
  input.addEventListener('blur', () => {
    setTimeout(()=>{
      if (input.value.trim()) { aggiungiOperaio(input.value.trim()); input.value=''; }
      document.getElementById('suggest-operario').style.display='none';
    }, 200);
  });
}

function filterOperarios(val, empresa) {
  const box = document.getElementById('suggest-operario');
  let operarios = catalogo
    .filter(c => (!empresa || c.Empresa===empresa) && !operaiList.includes(c.Operario))
    .map(c=>c.Operario)
    .filter((o,i,a)=>a.indexOf(o)===i)
    .filter(o=>o.toLowerCase().includes(val.toLowerCase()));
  if (!operarios.length) { box.style.display='none'; return; }
  box.innerHTML = operarios.map(o=>`<div class="suggest-item" onclick="selectOperario('${o}')">${o}</div>`).join('');
  box.style.display='block';
}

function selectOperario(nome) {
  aggiungiOperaio(nome);
  document.getElementById('operai-input').value='';
  document.getElementById('suggest-operario').style.display='none';
  // Riapri per aggiungerne altri
  const empresa = document.getElementById('f-empresa').value;
  setTimeout(()=>filterOperarios('', empresa), 100);
}

function aggiungiOperaio(nome) {
  if(!nome||operaiList.includes(nome)) return;
  operaiList.push(nome);
  renderTags();
}

function rimuoviOperaio(idx) {
  operaiList.splice(idx,1);
  renderTags();
}

function renderTags() {
  const container = document.getElementById('operai-container');
  const input = document.getElementById('operai-input');
  container.innerHTML='';
  operaiList.forEach((nome,i) => {
    const tag=document.createElement('div');
    tag.className='operaio-tag';
    tag.innerHTML=`${nome} <span class="rm" onclick="rimuoviOperaio(${i})">×</span>`;
    container.appendChild(tag);
  });
  container.appendChild(input);
}

// ── TIPO ──
function setTipo(tipo) {
  tipoAttivo=tipo;
  document.getElementById('btn-contrato').className='tipo-btn'+(tipo==='contrato'?' active-contrato':'');
  document.getElementById('btn-hora').className='tipo-btn'+(tipo==='hora'?' active-hora':'');
  document.getElementById('horas-field').className='form-group horas-field'+(tipo==='hora'?' visible':'');
}

// ── GUARDAR ──
async function guardar() {
  const fecha=inputToDate(document.getElementById('f-fecha').value);
  const empresa=document.getElementById('f-empresa').value.trim();
  const trabajo=document.getElementById('f-trabajo').value.trim();
  const horas=document.getElementById('f-horas').value;
  const notas=document.getElementById('f-notas').value.trim();
  const inputVal=document.getElementById('operai-input').value.trim();
  if(inputVal) aggiungiOperaio(inputVal);
  document.getElementById('operai-input').value='';

  if(!fecha){notif('⚠️ Fecha obligatoria','err');return;}
  if(!empresa){notif('⚠️ Empresa obligatoria','err');return;}
  if(!operaiList.length){notif('⚠️ Añade al menos un trabajador','err');return;}
  if(!trabajo){notif('⚠️ Describe el trabajo realizado','err');return;}
  if(tipoAttivo==='hora'&&!horas){notif('⚠️ Indica las horas trabajadas','err');return;}

  const btn=document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='GUARDANDO...';

  try {
    const res=await fetch(WH_SAVE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      Fecha:fecha, Empresa:empresa, Trabajadores:operaiList.join(', '),
      'Trabajo Realizado':trabajo,
      'Tipo (Contrato/Hora)':tipoAttivo==='contrato'?'Contrato':'Hora',
      Horas:tipoAttivo==='hora'?parseFloat(horas):'', Notas:notas
    })});
    if(res.ok){notif(`✅ Registrado — ${empresa} · ${operaiList.join(', ')}`,'ok');limpiar();setTimeout(cargarLista,800);}
    else throw new Error();
  } catch(e){notif('❌ Error de conexión — verifica n8n','err');}
  btn.disabled=false; btn.textContent='GUARDAR';
}

// ── LIMPIAR ──
function limpiar() {
  rigaSelezionata=null;
  document.getElementById('btn-eliminar-row').style.display='none';
  document.getElementById('f-empresa').value='';
  document.getElementById('f-trabajo').value='';
  document.getElementById('f-horas').value='';
  document.getElementById('f-notas').value='';
  document.getElementById('f-fecha').value=new Date().toISOString().split('T')[0];
  operaiList=[]; renderTags(); setTipo('contrato');
}

function notif(msg,tipo,id='notif') {
  const el=document.getElementById(id);
  el.textContent=msg; el.className='notifica '+tipo;
  setTimeout(()=>{el.className='notifica';},5000);
}

// ── ELIMINAR ──
async function eliminar() {
  if(!rigaSelezionata) return;
  if(!confirm(`⚠️ Eliminar el registro de ${rigaSelezionata.Empresa} del ${rigaSelezionata.Fecha}?\n\nEsta acción no se puede deshacer.`)) return;
  try {
    const res=await fetch(WH_DELETE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({Empresa:rigaSelezionata.Empresa,Fecha:rigaSelezionata.Fecha,Trabajadores:rigaSelezionata.Trabajadores})});
    if(res.ok){notif('✅ Registro eliminado','ok');rigaSelezionata=null;document.getElementById('btn-eliminar-row').style.display='none';limpiar();setTimeout(cargarLista,800);}
    else notif('❌ Error al eliminar','err');
  } catch(e){notif('❌ Error de conexión','err');}
}

// ── PRECOMPILA ──
function precompila(c) {
  rigaSelezionata=c;
  showPanelDirect('registro');
  document.getElementById('f-fecha').value=dateToInput(c.Fecha);
  document.getElementById('f-empresa').value=c.Empresa||'';
  document.getElementById('f-trabajo').value=c['Trabajo Realizado']||'';
  document.getElementById('f-notas').value=c.Notas||'';
  operaiList=c.Trabajadores?c.Trabajadores.split(',').map(s=>s.trim()).filter(Boolean):[];
  renderTags();
  const tipo=(c['Tipo (Contrato/Hora)']||'').toLowerCase().includes('hora')?'hora':'contrato';
  setTipo(tipo);
  if(tipo==='hora') document.getElementById('f-horas').value=c.Horas||'';
  document.getElementById('btn-eliminar-row').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function showPanelDirect(name) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.querySelector(`.nav-tab:nth-child(${name==='registro'?1:name==='lista'?2:3})`).classList.add('active');
}

// ── FILTRI ──
function filtroHoy() {
  mostraTutti=false;
  document.getElementById('btn-hoy').classList.add('active');
  document.getElementById('btn-todos').classList.remove('active');
  document.getElementById('filtro-fecha').value=new Date().toISOString().split('T')[0];
  cargarLista();
}
function filtroTodos() {
  mostraTutti=true;
  document.getElementById('btn-todos').classList.add('active');
  document.getElementById('btn-hoy').classList.remove('active');
  cargarLista();
}

// ── CARICA LISTA ──
async function cargarLista() {
  const lista=document.getElementById('lista');
  lista.innerHTML='<div class="loading">Cargando...</div>';
  const fechaFiltro=mostraTutti?'':inputToDate(document.getElementById('filtro-fecha').value);
  try {
    const res=await fetch(WH_LIST,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fecha:fechaFiltro})});
    const data=await res.json();
    renderLista(Array.isArray(data)?data:[]);
  } catch(e){
    lista.innerHTML='<div class="empty-state">Configura el webhook /diario-lista en n8n</div>';
    updateStats([]);
  }
}

function renderLista(righe) {
  const lista=document.getElementById('lista');
  if(!righe.length){lista.innerHTML='<div class="empty-state">Sin registros para esta fecha</div>';updateStats([]);return;}
  lista.innerHTML=righe.map(c=>{
    const tipo=(c['Tipo (Contrato/Hora)']||'').toLowerCase().includes('hora')?'hora':'contrato';
    const operai=c.Trabajadores?c.Trabajadores.split(',').map(s=>s.trim()):[];
    return `<div class="diario-row" onclick='precompila(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <div class="diario-header"><div class="diario-empresa">${c.Empresa||'—'}</div><div class="diario-fecha">${c.Fecha||''}</div></div>
      <div class="diario-trabajo">${c['Trabajo Realizado']||'—'}</div>
      <div class="diario-footer">
        <span class="tag ${tipo==='hora'?'tag-hora':'tag-contrato'}">${tipo==='hora'?`⏱ ${c.Horas||'?'}H`:'✓ CONTRATO'}</span>
        ${operai.map(o=>`<span class="tag tag-operaio">${o}</span>`).join('')}
      </div>
      ${c.Notas?`<div class="diario-notas">📝 ${c.Notas}</div>`:''}
    </div>`;
  }).join('');
  updateStats(righe);
}

function updateStats(righe) {
  const set=new Set(); let h=0;
  righe.forEach(r=>{
    if(r.Trabajadores) r.Trabajadores.split(',').forEach(o=>set.add(o.trim()));
    if((r['Tipo (Contrato/Hora)']||'').toLowerCase().includes('hora')&&r.Horas) h+=parseFloat(r.Horas)||0;
  });
  document.getElementById('sGrupos').textContent=righe.length;
  document.getElementById('sOperarios').textContent=set.size;
  document.getElementById('sHoras').textContent=h>0?h+'h':'0h';
}

// ── GESTIONE CATALOGO ──
function renderCatalogo() {
  const section=document.getElementById('catalogo-section');
  const empresas=[...new Set(catalogo.map(c=>c.Empresa))];
  if(!empresas.length){section.innerHTML='<div class="empty-state">Nessuna empresa. Aggiungine una!</div>';return;}
  section.innerHTML=empresas.map(emp=>{
    const ops=catalogo.filter(c=>c.Empresa===emp);
    return `<div class="catalogo-empresa">
      <div class="catalogo-empresa-header">
        <div class="catalogo-empresa-name">${emp}</div>
        <div class="catalogo-empresa-count">${ops.length} operario/i</div>
      </div>
      <div class="catalogo-operarios">
        ${ops.map(o=>`<div class="catalogo-operario-tag">${o.Operario} <span class="rm-op" onclick="eliminarOperario('${emp}','${o.Operario}')">×</span></div>`).join('')}
        <div style="display:flex;gap:6px;width:100%;margin-top:4px;">
          <input type="text" placeholder="Nuovo operaio..." id="op-input-${emp.replace(/\s/g,'_')}" style="flex:1;padding:7px 10px;font-size:12px;" onkeydown="if(event.key==='Enter') aggiungiOperarioEmpresa('${emp}')">
          <button class="btn-add" onclick="aggiungiOperarioEmpresa('${emp}')">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function aggiungiOperarioEmpresa(empresa) {
  const inputId='op-input-'+empresa.replace(/\s/g,'_');
  const nome=document.getElementById(inputId).value.trim();
  if(!nome) return;
  try {
    await fetch(WH_CAT_SAVE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({Empresa:empresa,Operario:nome})});
    catalogo.push({Empresa:empresa,Operario:nome});
    renderCatalogo();
    notif(`✅ ${nome} aggiunto a ${empresa}`,'ok','notif-gestion');
  } catch(e){notif('❌ Error de conexión','err','notif-gestion');}
}

async function eliminarOperario(empresa,operario) {
  if(!confirm(`Eliminar ${operario} de ${empresa}?`)) return;
  try {
    await fetch(WH_CAT_DEL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({Empresa:empresa,Operario:operario})});
    catalogo=catalogo.filter(c=>!(c.Empresa===empresa&&c.Operario===operario));
    renderCatalogo();
    notif(`✅ ${operario} eliminato`,'ok','notif-gestion');
  } catch(e){notif('❌ Error','err','notif-gestion');}
}

function addEmpresaForm() {
  const form=document.getElementById('nueva-empresa-form');
  form.style.display=form.style.display==='none'?'block':'none';
}

async function guardarEmpresa() {
  const nome=document.getElementById('nueva-empresa-input').value.trim();
  if(!nome) return;
  // Aggiungi empresa con operaio placeholder vuoto — oppure chiedi il primo operaio
  const operario=prompt(`Primo operaio di "${nome}" (obbligatorio):`);
  if(!operario) return;
  try {
    await fetch(WH_CAT_SAVE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({Empresa:nome,Operario:operario})});
    catalogo.push({Empresa:nome,Operario:operario});
    document.getElementById('nueva-empresa-input').value='';
    document.getElementById('nueva-empresa-form').style.display='none';
    renderCatalogo();
    notif(`✅ Empresa "${nome}" aggiunta`,'ok','notif-gestion');
  } catch(e){notif('❌ Error de conexión','err','notif-gestion');}
}
</script>
