<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBRA R-25 — Diario</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F0F2F5;
  --surface: #FFFFFF;
  --surface2: #E8ECF2;
  --border: #C5CAD5;
  --accent: #1C4587;
  --accent2: #2563EB;
  --green: #16A34A;
  --red: #DC2626;
  --blue: #1D4ED8;
  --text: #0F172A;
  --text2: #475569;
  --text3: #94A3B8;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Bebas Neue', cursive;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* HEADER */
header {
  background: var(--accent);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 62px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}
.logo { font-family: var(--display); font-size: 22px; letter-spacing: 2px; color: #fff; }
.logo span { color: rgba(255,255,255,0.65); font-size: 12px; font-family: var(--mono); margin-left: 10px; }
.clock { font-family: var(--mono); font-size: 12px; color: rgba(255,255,255,0.85); text-align: right; line-height: 1.7; }

/* NAV */
.nav-tabs {
  background: var(--accent);
  padding: 0 16px 12px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
}
.nav-tab {
  padding: 10px 18px;
  border: 2px solid rgba(255,255,255,0.35);
  border-radius: 8px;
  background: none;
  color: rgba(255,255,255,0.8);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.nav-tab.active { background: #fff; color: var(--accent); border-color: #fff; }
.nav-tab:hover:not(.active) { background: rgba(255,255,255,0.15); color: #fff; }

.panel { display: none; }
.panel.active { display: block; }
main { max-width: 720px; margin: 0 auto; padding: 20px 16px; }

/* CARD */
.card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 22px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.card-title {
  font-family: var(--display);
  font-size: 22px;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}

/* FORM */
.fg { margin-bottom: 16px; }
.fg:last-child { margin-bottom: 0; }
.fg label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

input, select, textarea {
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent2); background: #fff; }
input::placeholder, textarea::placeholder { color: var(--text3); }
select option { background: #fff; }
textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

/* TIPO */
.tipo-sel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.tipo-btn {
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text2);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.tipo-btn.c { background: #DCFCE7; border-color: var(--green); color: var(--green); }
.tipo-btn.h { background: #DBEAFE; border-color: var(--blue); color: var(--blue); }
.hf { display: none; }
.hf.on { display: block; }

/* TAGS OPERAI */
.tags-box {
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  min-height: 52px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  cursor: text;
  transition: border-color 0.2s;
}
.tags-box:focus-within { border-color: var(--accent2); background: #fff; }
.tag-chip {
  background: var(--accent);
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.tag-chip .x { cursor: pointer; font-size: 16px; opacity: 0.75; }
.tag-chip .x:hover { opacity: 1; }
.tag-input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  padding: 4px;
  min-width: 140px;
  flex: 1;
}
.hint { font-size: 12px; color: var(--text3); margin-top: 5px; }

/* SUGGEST */
.sbox { position: relative; }
.slist {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: #fff;
  border: 2px solid var(--accent);
  border-radius: 8px;
  z-index: 60;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.sitem {
  padding: 12px 14px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.sitem:last-child { border-bottom: none; }
.sitem:hover { background: var(--surface2); color: var(--accent); }

/* BOTTONI */
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
.btn {
  padding: 16px;
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 2px solid var(--border); }
.btn-secondary:hover { border-color: var(--text); color: var(--text); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-danger {
  width: 100%;
  background: #FEE2E2;
  color: var(--red);
  border: 2px solid var(--red);
  font-size: 17px;
  font-weight: 700;
  padding: 16px;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 12px;
  display: none;
  transition: all 0.2s;
}
.btn-danger:hover { background: var(--red); color: #fff; }

/* NOTIFICA */
.notif {
  display: none;
  padding: 14px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  margin-top: 14px;
  line-height: 1.5;
}
.notif.ok { background: #DCFCE7; border: 2px solid var(--green); color: #15803D; display: block; }
.notif.err { background: #FEE2E2; border: 2px solid var(--red); color: #B91C1C; display: block; }

/* LISTA */
.lista-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.lista-title { font-family: var(--display); font-size: 20px; letter-spacing: 1px; color: var(--accent); }
.btn-refresh {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-refresh:hover { background: var(--accent2); }

.filtro-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.filtro-bar input[type="date"] {
  flex: 1;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
}
.filtro-bar input[type="date"]:focus { border-color: var(--accent); }
.btn-f {
  background: var(--surface);
  border: 2px solid var(--border);
  color: var(--text2);
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.btn-f.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-f:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

.dlist { display: flex; flex-direction: column; gap: 10px; }
.drow {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.drow:hover { border-color: var(--accent); box-shadow: 0 3px 10px rgba(28,69,135,0.12); }
.drow-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.drow-empresa { font-family: var(--display); font-size: 18px; letter-spacing: 1px; color: var(--accent); }
.drow-fecha { font-size: 12px; font-weight: 600; color: #fff; background: var(--accent); padding: 4px 10px; border-radius: 5px; font-family: var(--mono); }
.drow-trabajo { font-size: 15px; color: var(--text); margin-bottom: 10px; line-height: 1.5; }
.drow-tags { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.dtag { display: inline-block; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.dtag-c { background: #DCFCE7; color: #15803D; border: 1.5px solid #86EFAC; }
.dtag-h { background: #DBEAFE; color: #1D4ED8; border: 1.5px solid #93C5FD; }
.dtag-o { background: #EEF0F5; color: var(--accent); border: 1.5px solid var(--border); }
.drow-notas { font-size: 13px; color: var(--text2); margin-top: 8px; font-style: italic; padding-top: 8px; border-top: 1px solid var(--border); }

/* GESTIONE */
.emp-card { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.emp-head { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-bottom: 2px solid var(--border); }
.emp-name { font-family: var(--display); font-size: 18px; letter-spacing: 1px; color: var(--accent); }
.emp-count { font-size: 12px; font-weight: 600; color: var(--text2); }
.emp-body { padding: 14px 18px; display: flex; flex-wrap: wrap; gap: 8px; }
.op-chip { background: var(--surface2); border: 2px solid var(--border); border-radius: 7px; padding: 8px 12px; font-size: 14px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 10px; }
.op-chip .xop { cursor: pointer; color: var(--text3); font-size: 18px; font-weight: 700; transition: color 0.2s; }
.op-chip .xop:hover { color: var(--red); }
.add-op { display: flex; gap: 8px; width: 100%; margin-top: 4px; }
.add-op input { flex: 1; font-size: 15px; padding: 10px 12px; }
.btn-add { padding: 10px 18px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
.btn-add:hover { background: var(--accent2); }
.btn-new-emp { width: 100%; padding: 14px; background: none; border: 2px dashed var(--border); color: var(--text2); border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
.btn-new-emp:hover { border-color: var(--accent); color: var(--accent); }
.new-emp-form { display: none; margin-top: 12px; }
.notif-g { display: none; padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; margin-top: 12px; }
.notif-g.ok { background: #DCFCE7; border: 2px solid var(--green); color: #15803D; display: block; }
.notif-g.err { background: #FEE2E2; border: 2px solid var(--red); color: #B91C1C; display: block; }

.empty { text-align: center; padding: 36px; color: var(--text3); font-size: 15px; border: 2px dashed var(--border); border-radius: 12px; }
.loading { text-align: center; padding: 28px; color: var(--text2); font-size: 15px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

@media(max-width:540px) {
  .g2 { grid-template-columns: 1fr; }
  .filtro-bar { flex-wrap: wrap; }
  .btn { font-size: 16px; padding: 14px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">OBRA R-25 <span>// DIARIO</span></div>
  <div class="clock" id="clock"></div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="nav('registro',this)">✏️ REGISTRAR</button>
  <button class="nav-tab" onclick="nav('lista',this); cargarLista()">📋 LISTA</button>
  <button class="nav-tab" onclick="nav('gestion',this); cargarCatalogo()">⚙️ GESTIÓN</button>
</div>

<!-- REGISTRAR -->
<div class="panel active" id="panel-registro">
<main>
  <div class="card">
    <div class="card-title">📒 Nuevo Registro</div>

    <div class="g2" style="margin-bottom:16px">
      <div class="fg" style="margin:0">
        <label>Fecha</label>
        <input type="date" id="f-fecha">
      </div>
      <div class="fg" style="margin:0">
        <label>Empresa</label>
        <div class="sbox">
          <input type="text" id="f-empresa" placeholder="Empresa..." autocomplete="off"
            oninput="showEmp(this.value)" onfocus="showEmp(this.value)">
          <div class="slist" id="sl-emp"></div>
        </div>
      </div>
    </div>

    <div class="fg">
      <label>Trabajadores — Intro o coma para añadir</label>
      <div class="tags-box" id="tags-box" onclick="document.getElementById('tag-input').focus()">
        <input type="text" id="tag-input" class="tag-input" placeholder="Nombre del trabajador...">
      </div>
      <div class="sbox"><div class="slist" id="sl-op"></div></div>
      <div class="hint">↵ Intro o , para añadir · toca × para eliminar</div>
    </div>

    <div class="fg">
      <label>Trabajo realizado</label>
      <textarea id="f-trabajo" placeholder="Ej: Realización pozo V5, Encofrado muro norte..."></textarea>
    </div>

    <div class="fg">
      <label>Tipo de trabajo</label>
      <div class="tipo-sel">
        <div class="tipo-btn c" id="tb-c" onclick="setTipo('c')">✓ CONTRATO</div>
        <div class="tipo-btn" id="tb-h" onclick="setTipo('h')">⏱ POR HORA</div>
      </div>
    </div>

    <div class="fg hf" id="hf">
      <label>Horas trabajadas</label>
      <input type="number" id="f-horas" placeholder="8" min="0" step="0.5">
    </div>

    <div class="fg">
      <label>Notas</label>
      <input type="text" id="f-notas" placeholder="Opcional...">
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="limpiar()">LIMPIAR</button>
      <button class="btn btn-primary" id="btn-save" onclick="guardar()">GUARDAR</button>
    </div>
    <button class="btn-danger" id="btn-del" onclick="eliminar()">🗑 ELIMINAR ESTE REGISTRO</button>
    <div class="notif" id="notif-r"></div>
  </div>
</main>
</div>

<!-- LISTA -->
<div class="panel" id="panel-lista">
<main>
  <div class="lista-bar">
    <div class="lista-title">Registros</div>
    <button class="btn-refresh" onclick="cargarLista()">↻ Actualizar</button>
  </div>
  <div class="filtro-bar">
    <input type="date" id="filtro-f" onchange="onFiltroChange()">
    <button class="btn-f active" id="bf-hoy" onclick="filtroHoy()">HOY</button>
    <button class="btn-f" id="bf-todos" onclick="filtroTodos()">TODOS</button>
  </div>
  <div class="dlist" id="dlist"><div class="loading">Cargando...</div></div>
</main>
</div>

<!-- GESTIÓN -->
<div class="panel" id="panel-gestion">
<main>
  <div class="card">
    <div class="card-title">⚙️ Empresas y Operarios</div>
    <div id="cat-section"><div class="loading">Cargando catálogo...</div></div>
    <button class="btn-new-emp" onclick="toggleNewEmp()">+ AÑADIR NUEVA EMPRESA</button>
    <div class="new-emp-form" id="new-emp-form">
      <div class="add-op">
        <input type="text" id="new-emp-input" placeholder="Nombre de la empresa...">
        <button class="btn-add" onclick="saveNewEmp()">AÑADIR</button>
      </div>
    </div>
    <div class="notif-g" id="notif-g"></div>
  </div>
</main>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const N8N = 'https://demon8n-n8n.cup5ta.easypanel.host/webhook';
const WH_SAVE     = N8N + '/diario-save';
const WH_LIST     = N8N + '/diario-lista';
const WH_DEL      = N8N + '/diario-eliminar';
const WH_CAT_LIST = N8N + '/catalogo-lista';
const WH_CAT_SAVE = N8N + '/catalogo-save';
const WH_CAT_DEL  = N8N + '/catalogo-eliminar';

// ── STATO ─────────────────────────────────────────────────
let tipo = 'c';
let tags = [];
let rigaSel = null;
let mostraTutti = false;
let catalogo = [];

// ── OROLOGIO ──────────────────────────────────────────────
function tick() {
  const d = new Date();
  document.getElementById('clock').innerHTML =
    d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}).toUpperCase() +
    '<br>' + d.toTimeString().slice(0,5);
}
setInterval(tick, 1000); tick();

// ── DATE ──────────────────────────────────────────────────
function i2d(s) {
  if (!s) return '';
  if (s.includes('/')) return s;
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}
function d2i(s) {
  if (!s) return '';
  if (s.includes('-')) return s;
  const [d,m,y] = s.split('/');
  return `${y}-${m}-${d}`;
}

// ── INIT ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('f-fecha').value = hoy;
  document.getElementById('filtro-f').value = hoy;
  initTagInput();
  cargarCatalogo();

  document.addEventListener('click', e => {
    if (!e.target.closest('.sbox') && !e.target.closest('.tags-box'))
      document.querySelectorAll('.slist').forEach(s => s.style.display = 'none');
  });

  document.getElementById('filtro-f').addEventListener('change', onFiltroChange);
});

// ── NAV ───────────────────────────────────────────────────
function nav(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
}

// ── CATALOGO ──────────────────────────────────────────────
async function cargarCatalogo() {
  try {
    const r = await fetch(WH_CAT_LIST, { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    const d = await r.json();
    catalogo = Array.isArray(d) ? d : [];
  } catch(e) { catalogo = []; }
  renderCatalogo();
}

// ── SUGGEST EMPRESA ───────────────────────────────────────
function showEmp(val) {
  const sl = document.getElementById('sl-emp');
  const list = [...new Set(catalogo.map(c => c.Empresa))]
    .filter(e => e && e.toLowerCase().includes(val.toLowerCase()));
  if (!list.length) { sl.style.display = 'none'; return; }
  sl.innerHTML = list.map(e => `<div class="sitem" onclick="pickEmp('${e.replace(/'/g,"\\'")}')"> ${e}</div>`).join('');
  sl.style.display = 'block';
}
function pickEmp(e) {
  document.getElementById('f-empresa').value = e;
  document.getElementById('sl-emp').style.display = 'none';
  showOp('', e);
}

// ── TAGS OPERAI ───────────────────────────────────────────
function initTagInput() {
  const inp = document.getElementById('tag-input');
  inp.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ',') && inp.value.trim()) {
      e.preventDefault();
      addTag(inp.value.replace(',','').trim());
      inp.value = '';
      document.getElementById('sl-op').style.display = 'none';
    } else if (e.key === 'Backspace' && !inp.value && tags.length) {
      removeTag(tags.length - 1);
    }
  });
  inp.addEventListener('input', () => showOp(inp.value, document.getElementById('f-empresa').value));
  inp.addEventListener('focus', () => showOp(inp.value, document.getElementById('f-empresa').value));
  inp.addEventListener('blur', () => setTimeout(() => {
    if (inp.value.trim()) { addTag(inp.value.trim()); inp.value = ''; }
    document.getElementById('sl-op').style.display = 'none';
  }, 200));
}

function showOp(val, emp) {
  const sl = document.getElementById('sl-op');
  const list = catalogo
    .filter(c => (!emp || c.Empresa === emp) && !tags.includes(c.Operario))
    .map(c => c.Operario)
    .filter((o,i,a) => a.indexOf(o) === i)
    .filter(o => o && o.toLowerCase().includes(val.toLowerCase()));
  if (!list.length) { sl.style.display = 'none'; return; }
  sl.innerHTML = list.map(o => `<div class="sitem" onclick="pickOp('${o.replace(/'/g,"\\'")}')">👤 ${o}</div>`).join('');
  sl.style.display = 'block';
}
function pickOp(o) {
  addTag(o);
  document.getElementById('tag-input').value = '';
  document.getElementById('sl-op').style.display = 'none';
  setTimeout(() => showOp('', document.getElementById('f-empresa').value), 100);
}
function addTag(nome) {
  if (!nome || tags.includes(nome)) return;
  tags.push(nome);
  renderTags();
}
function removeTag(i) {
  tags.splice(i, 1);
  renderTags();
}
function renderTags() {
  const box = document.getElementById('tags-box');
  const inp = document.getElementById('tag-input');
  box.innerHTML = '';
  tags.forEach((t, i) => {
    const c = document.createElement('div');
    c.className = 'tag-chip';
    c.innerHTML = `${t} <span class="x" onclick="removeTag(${i})">×</span>`;
    box.appendChild(c);
  });
  box.appendChild(inp);
}

// ── TIPO ──────────────────────────────────────────────────
function setTipo(t) {
  tipo = t;
  document.getElementById('tb-c').className = 'tipo-btn' + (t === 'c' ? ' c' : '');
  document.getElementById('tb-h').className = 'tipo-btn' + (t === 'h' ? ' h' : '');
  document.getElementById('hf').className = 'fg hf' + (t === 'h' ? ' on' : '');
}

// ── GUARDAR ───────────────────────────────────────────────
async function guardar() {
  const fecha    = i2d(document.getElementById('f-fecha').value);
  const empresa  = document.getElementById('f-empresa').value.trim();
  const trabajo  = document.getElementById('f-trabajo').value.trim();
  const horas    = document.getElementById('f-horas').value;
  const notas    = document.getElementById('f-notas').value.trim();

  // Cattura eventuale tag non ancora aggiunto
  const inp = document.getElementById('tag-input');
  if (inp.value.trim()) { addTag(inp.value.trim()); inp.value = ''; }

  if (!fecha)   { notif('⚠️ Fecha obligatoria', 'err', 'notif-r'); return; }
  if (!empresa) { notif('⚠️ Empresa obligatoria', 'err', 'notif-r'); return; }
  if (!tags.length) { notif('⚠️ Añade al menos un trabajador', 'err', 'notif-r'); return; }
  if (!trabajo) { notif('⚠️ Describe el trabajo realizado', 'err', 'notif-r'); return; }
  if (tipo === 'h' && !horas) { notif('⚠️ Indica las horas trabajadas', 'err', 'notif-r'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'GUARDANDO...';

  try {
    const r = await fetch(WH_SAVE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        Fecha: fecha,
        Empresa: empresa,
        Trabajadores: tags.join(', '),
        'Trabajo Realizado': trabajo,
        'Tipo (Contrato/Hora)': tipo === 'c' ? 'Contrato' : 'Hora',
        Horas: tipo === 'h' ? parseFloat(horas) : '',
        Notas: notas
      })
    });
    if (r.ok) {
      notif(`✅ Registrado — ${empresa} · ${tags.join(', ')}`, 'ok', 'notif-r');
      limpiar();
    } else throw new Error();
  } catch(e) { notif('❌ Error de conexión — verifica n8n', 'err', 'notif-r'); }

  btn.disabled = false; btn.textContent = 'GUARDAR';
}

// ── LIMPIAR ───────────────────────────────────────────────
function limpiar() {
  rigaSel = null;
  document.getElementById('btn-del').style.display = 'none';
  document.getElementById('f-empresa').value = '';
  document.getElementById('f-trabajo').value = '';
  document.getElementById('f-horas').value = '';
  document.getElementById('f-notas').value = '';
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
  tags = []; renderTags(); setTipo('c');
}

// ── NOTIF ─────────────────────────────────────────────────
function notif(msg, tipo, id) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'notif ' + tipo;
  setTimeout(() => { el.className = 'notif'; }, 5000);
}

// ── ELIMINAR ──────────────────────────────────────────────
async function eliminar() {
  if (!rigaSel) return;
  if (!confirm(`⚠️ Eliminar el registro de ${rigaSel.Empresa} del ${rigaSel.Fecha}?\n\nEsta acción no se puede deshacer.`)) return;
  const btn = document.getElementById('btn-del');
  btn.textContent = 'ELIMINANDO...';
  try {
    const r = await fetch(WH_DEL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ Fecha: rigaSel.Fecha, Empresa: rigaSel.Empresa, Trabajadores: rigaSel.Trabajadores })
    });
    if (r.ok) {
      notif('✅ Registro eliminado correctamente', 'ok', 'notif-r');
      rigaSel = null;
      document.getElementById('btn-del').style.display = 'none';
      limpiar();
    } else {
      notif('❌ Error al eliminar — verifica n8n', 'err', 'notif-r');
    }
  } catch(e) { notif('❌ Error de conexión', 'err', 'notif-r'); }
  btn.textContent = '🗑 ELIMINAR ESTE REGISTRO';
}

// ── PRECOMPILA ────────────────────────────────────────────
function precompila(row) {
  rigaSel = row;
  document.getElementById('f-fecha').value   = d2i(row.Fecha);
  document.getElementById('f-empresa').value = row.Empresa || '';
  document.getElementById('f-trabajo').value = row['Trabajo Realizado'] || '';
  document.getElementById('f-notas').value   = row.Notas || '';
  tags = row.Trabajadores ? row.Trabajadores.split(',').map(s => s.trim()).filter(Boolean) : [];
  renderTags();
  const t = (row['Tipo (Contrato/Hora)'] || '').toLowerCase().includes('hora') ? 'h' : 'c';
  setTipo(t);
  if (t === 'h') document.getElementById('f-horas').value = row.Horas || '';
  document.getElementById('btn-del').style.display = 'block';
  // Vai al tab registro
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-registro').classList.add('active');
  document.querySelector('.nav-tab').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── FILTRI ────────────────────────────────────────────────
function filtroHoy() {
  mostraTutti = false;
  document.getElementById('bf-hoy').classList.add('active');
  document.getElementById('bf-todos').classList.remove('active');
  document.getElementById('filtro-f').value = new Date().toISOString().split('T')[0];
  cargarLista();
}
function filtroTodos() {
  mostraTutti = true;
  document.getElementById('bf-todos').classList.add('active');
  document.getElementById('bf-hoy').classList.remove('active');
  cargarLista();
}
function onFiltroChange() {
  mostraTutti = false;
  document.getElementById('bf-hoy').classList.remove('active');
  document.getElementById('bf-todos').classList.remove('active');
  cargarLista();
}

// ── LISTA ─────────────────────────────────────────────────
async function cargarLista() {
  const dl = document.getElementById('dlist');
  dl.innerHTML = '<div class="loading">Cargando...</div>';
  const fecha = mostraTutti ? '' : i2d(document.getElementById('filtro-f').value);
  try {
    const r = await fetch(WH_LIST, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fecha })
    });
    const data = await r.json();
    renderLista(Array.isArray(data) ? data : []);
  } catch(e) {
    dl.innerHTML = '<div class="empty">⚠️ No se puede conectar con n8n<br>Verifica que el webhook esté activo</div>';
  }
}

function renderLista(rows) {
  const dl = document.getElementById('dlist');
  if (!rows.length) { dl.innerHTML = '<div class="empty">Sin registros para esta fecha</div>'; return; }
  dl.innerHTML = rows.map(row => {
    const t = (row['Tipo (Contrato/Hora)'] || '').toLowerCase().includes('hora') ? 'h' : 'c';
    const ops = row.Trabajadores ? row.Trabajadores.split(',').map(s => s.trim()) : [];
    const safe = encodeURIComponent(JSON.stringify(row));
    return `<div class="drow" onclick="precompila(JSON.parse(decodeURIComponent('${safe}')))">
      <div class="drow-top">
        <div class="drow-empresa">${row.Empresa || '—'}</div>
        <div class="drow-fecha">${row.Fecha || ''}</div>
      </div>
      <div class="drow-trabajo">${row['Trabajo Realizado'] || '—'}</div>
      <div class="drow-tags">
        <span class="dtag ${t === 'h' ? 'dtag-h' : 'dtag-c'}">${t === 'h' ? `⏱ ${row.Horas || '?'}h` : '✓ CONTRATO'}</span>
        ${ops.map(o => `<span class="dtag dtag-o">👤 ${o}</span>`).join('')}
      </div>
      ${row.Notas ? `<div class="drow-notas">📝 ${row.Notas}</div>` : ''}
    </div>`;
  }).join('');
}

// ── GESTIONE CATALOGO ─────────────────────────────────────
function renderCatalogo() {
  const sec = document.getElementById('cat-section');
  const emps = [...new Set(catalogo.map(c => c.Empresa))];
  if (!emps.length) { sec.innerHTML = '<div class="empty">No hay empresas. ¡Añade una!</div>'; return; }
  sec.innerHTML = emps.map(emp => {
    const ops = catalogo.filter(c => c.Empresa === emp);
    const id = emp.replace(/[^a-zA-Z0-9]/g, '_');
    return `<div class="emp-card">
      <div class="emp-head">
        <div class="emp-name">${emp}</div>
        <div class="emp-count">${ops.length} operario/s</div>
      </div>
      <div class="emp-body">
        ${ops.map(o => `<div class="op-chip">${o.Operario}
          <span class="xop" onclick="delOp('${emp.replace(/'/g,"\\'")}','${o.Operario.replace(/'/g,"\\'")}')">×</span>
        </div>`).join('')}
        <div class="add-op" style="width:100%">
          <input type="text" id="inp-${id}" placeholder="Nuevo operario..."
            onkeydown="if(event.key==='Enter') addOp('${emp.replace(/'/g,"\\'")}','${id}')">
          <button class="btn-add" onclick="addOp('${emp.replace(/'/g,"\\'")}','${id}')">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function addOp(emp, id) {
  const inp = document.getElementById('inp-' + id);
  const nome = inp.value.trim();
  if (!nome) return;
  try {
    await fetch(WH_CAT_SAVE, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ Empresa: emp, Operario: nome }) });
    catalogo.push({ Empresa: emp, Operario: nome });
    renderCatalogo();
    notifG(`✅ ${nome} añadido a ${emp}`, 'ok');
  } catch(e) { notifG('❌ Error de conexión', 'err'); }
}

async function delOp(emp, op) {
  if (!confirm(`¿Eliminar ${op} de ${emp}?`)) return;
  try {
    await fetch(WH_CAT_DEL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ Empresa: emp, Operario: op }) });
    catalogo = catalogo.filter(c => !(c.Empresa === emp && c.Operario === op));
    renderCatalogo();
    notifG(`✅ ${op} eliminado`, 'ok');
  } catch(e) { notifG('❌ Error', 'err'); }
}

function toggleNewEmp() {
  const f = document.getElementById('new-emp-form');
  f.style.display = f.style.display === 'none' || f.style.display === '' ? 'block' : 'none';
}

async function saveNewEmp() {
  const nome = document.getElementById('new-emp-input').value.trim();
  if (!nome) return;
  const op = prompt(`Primer operario de "${nome}" (obligatorio):`);
  if (!op) return;
  try {
    await fetch(WH_CAT_SAVE, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ Empresa: nome, Operario: op }) });
    catalogo.push({ Empresa: nome, Operario: op });
    document.getElementById('new-emp-input').value = '';
    document.getElementById('new-emp-form').style.display = 'none';
    renderCatalogo();
    notifG(`✅ Empresa "${nome}" añadida`, 'ok');
  } catch(e) { notifG('❌ Error de conexión', 'err'); }
}

function notifG(msg, t) {
  const el = document.getElementById('notif-g');
  el.textContent = msg;
  el.className = 'notif-g ' + t;
  setTimeout(() => { el.className = 'notif-g'; }, 5000);
}
</script>
