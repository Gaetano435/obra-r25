<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBRA R-25 — Diario</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F0F2F5; --card:#FFFFFF; --card2:#E8ECF2;
  --border:#C5CAD5; --accent:#1C4587; --accent2:#2563EB;
  --green:#16A34A; --red:#DC2626; --blue:#1D4ED8;
  --t1:#0F172A; --t2:#475569; --t3:#94A3B8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;min-height:100vh;}

header{background:var(--accent);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:100;box-shadow:0 3px 10px rgba(0,0,0,0.2);}
.logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;color:#fff;}
.logo span{color:rgba(255,255,255,0.6);font-size:12px;font-family:'DM Mono',monospace;margin-left:10px;}
.clock{font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,0.85);text-align:right;line-height:1.7;}

.tabs{background:var(--accent);padding:0 16px 12px;display:flex;gap:8px;}
.tab{padding:10px 18px;border:2px solid rgba(255,255,255,0.35);border-radius:8px;background:none;color:rgba(255,255,255,0.8);font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.tab.on{background:#fff;color:var(--accent);border-color:#fff;}
.tab:hover:not(.on){background:rgba(255,255,255,0.15);color:#fff;}

.panel{display:none;}.panel.on{display:block;}
main{max-width:720px;margin:0 auto;padding:20px 16px;}

.card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:22px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.card h2{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;color:var(--accent);margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--border);}

.fg{margin-bottom:16px;}
.fg label{display:block;font-size:13px;font-weight:700;color:var(--t1);margin-bottom:6px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}

input,select,textarea{background:var(--card2);border:2px solid var(--border);border-radius:8px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:16px;padding:12px 14px;outline:none;transition:border-color 0.2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent2);background:#fff;}
input::placeholder,textarea::placeholder{color:var(--t3);}
select option{background:#fff;}
textarea{resize:vertical;min-height:80px;line-height:1.5;}

.tipo-sel{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tipo-btn{padding:14px;border:2px solid var(--border);border-radius:10px;background:var(--card2);color:var(--t2);font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.2s;}
.tipo-btn.c{background:#DCFCE7;border-color:var(--green);color:var(--green);}
.tipo-btn.h{background:#DBEAFE;border-color:var(--blue);color:var(--blue);}
.hf{display:none;margin-top:16px;}.hf.on{display:block;}

.tags-wrap{background:var(--card2);border:2px solid var(--border);border-radius:8px;padding:8px;min-height:52px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;cursor:text;transition:border-color 0.2s;}
.tags-wrap:focus-within{border-color:var(--accent2);background:#fff;}
.chip{background:var(--accent);color:#fff;padding:6px 10px;border-radius:6px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.chip .x{cursor:pointer;font-size:16px;opacity:0.75;line-height:1;}
.chip .x:hover{opacity:1;}
.tag-in{background:none;border:none;outline:none;color:var(--t1);font-size:15px;padding:4px;min-width:140px;flex:1;}
.hint{font-size:12px;color:var(--t3);margin-top:5px;}

.drop-wrap{position:relative;}
.drop{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:2px solid var(--accent);border-radius:8px;z-index:60;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.12);}
.drop-item{padding:12px 14px;font-size:15px;font-weight:500;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s;}
.drop-item:last-child{border-bottom:none;}
.drop-item:hover{background:var(--card2);color:var(--accent);}

.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px;}
.btn{padding:16px;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-p{background:var(--accent);color:#fff;}.btn-p:hover{background:var(--accent2);}
.btn-s{background:var(--card2);color:var(--t2);border:2px solid var(--border);}.btn-s:hover{border-color:var(--t1);color:var(--t1);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
#btn-del{width:100%;background:#FEE2E2;color:var(--red);border:2px solid var(--red);font-size:17px;font-weight:700;padding:16px;border-radius:10px;cursor:pointer;margin-top:12px;display:none;transition:all 0.2s;}
#btn-del:hover{background:var(--red);color:#fff;}

.notif{display:none;padding:14px 16px;border-radius:8px;font-size:14px;font-weight:500;margin-top:14px;line-height:1.5;}
.notif.ok{background:#DCFCE7;border:2px solid var(--green);color:#15803D;display:block;}
.notif.err{background:#FEE2E2;border:2px solid var(--red);color:#B91C1C;display:block;}

.list-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.list-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;color:var(--accent);}
.btn-ref{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;}
.btn-ref:hover{background:var(--accent2);}

.fbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
.fbar input[type=date]{flex:1;background:var(--card);border:2px solid var(--border);border-radius:8px;color:var(--t1);font-size:15px;padding:10px 14px;outline:none;}
.fbar input[type=date]:focus{border-color:var(--accent);}
.fbtn{background:var(--card);border:2px solid var(--border);color:var(--t2);padding:10px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.fbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.fbtn:hover:not(.on){border-color:var(--accent);color:var(--accent);}

.rows{display:flex;flex-direction:column;gap:10px;}
.row{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.row:hover{border-color:var(--accent);box-shadow:0 3px 10px rgba(28,69,135,0.1);}
.row-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.row-emp{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:1px;color:var(--accent);}
.row-date{font-size:12px;font-weight:600;color:#fff;background:var(--accent);padding:4px 10px;border-radius:5px;font-family:'DM Mono',monospace;}
.row-job{font-size:15px;color:var(--t1);margin-bottom:10px;line-height:1.5;}
.row-tags{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.rtag{display:inline-block;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;}
.rtag-c{background:#DCFCE7;color:#15803D;border:1.5px solid #86EFAC;}
.rtag-h{background:#DBEAFE;color:#1D4ED8;border:1.5px solid #93C5FD;}
.rtag-o{background:#EEF0F5;color:var(--accent);border:1.5px solid var(--border);}
.row-note{font-size:13px;color:var(--t2);margin-top:8px;font-style:italic;padding-top:8px;border-top:1px solid var(--border);}

.emp-card{background:var(--card);border:2px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.emp-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:var(--card2);border-bottom:2px solid var(--border);}
.emp-name{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:1px;color:var(--accent);}
.emp-cnt{font-size:12px;font-weight:600;color:var(--t2);}
.emp-body{padding:14px 18px;display:flex;flex-wrap:wrap;gap:8px;}
.op-chip{background:var(--card2);border:2px solid var(--border);border-radius:7px;padding:8px 12px;font-size:14px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:10px;}
.op-x{cursor:pointer;color:var(--t3);font-size:18px;font-weight:700;transition:color 0.2s;}
.op-x:hover{color:var(--red);}
.add-row{display:flex;gap:8px;width:100%;margin-top:4px;}
.add-row input{flex:1;font-size:15px;padding:10px 12px;}
.btn-add{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-add:hover{background:var(--accent2);}
.btn-newemp{width:100%;padding:14px;background:none;border:2px dashed var(--border);color:var(--t2);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:10px;}
.btn-newemp:hover{border-color:var(--accent);color:var(--accent);}
.ng{display:none;padding:12px 16px;border-radius:8px;font-size:14px;font-weight:500;margin-top:12px;}
.ng.ok{background:#DCFCE7;border:2px solid var(--green);color:#15803D;display:block;}
.ng.err{background:#FEE2E2;border:2px solid var(--red);color:#B91C1C;display:block;}

.empty{text-align:center;padding:36px;color:var(--t3);font-size:15px;border:2px dashed var(--border);border-radius:12px;}
.loading{text-align:center;padding:28px;color:var(--t2);font-size:15px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@media(max-width:540px){.g2{grid-template-columns:1fr;}.fbar{flex-wrap:wrap;}.btn{font-size:16px;padding:14px;}}
</style>
</head>
<body>

<header>
  <div class="logo">OBRA R-25 <span>// DIARIO</span></div>
  <div class="clock" id="clock"></div>
</header>

<div class="tabs">
  <button class="tab on" id="t-reg" onclick="goTab('registro')">✏️ REGISTRAR</button>
  <button class="tab" id="t-list" onclick="goTab('lista'); loadList()">📋 LISTA</button>
  <button class="tab" id="t-gest" onclick="goTab('gestion'); loadCat()">⚙️ GESTIÓN</button>
</div>

<!-- REGISTRAR -->
<div class="panel on" id="panel-registro">
<main>
<div class="card">
  <h2>📒 Nuevo Registro</h2>
  <div class="g2">
    <div class="fg" style="margin:0">
      <label>Fecha</label>
      <input type="date" id="f-fecha">
    </div>
    <div class="fg" style="margin:0">
      <label>Empresa</label>
      <div class="drop-wrap">
        <input type="text" id="f-emp" placeholder="Empresa..." autocomplete="off"
          oninput="showEmpDrop(this.value)" onfocus="showEmpDrop(this.value)">
        <div class="drop" id="drop-emp"></div>
      </div>
    </div>
  </div>

  <div class="fg">
    <label>Trabajadores — Intro o coma para añadir</label>
    <div class="tags-wrap" id="tags-wrap" onclick="document.getElementById('tag-in').focus()">
      <input type="text" id="tag-in" class="tag-in" placeholder="Nombre del trabajador...">
    </div>
    <div class="drop-wrap"><div class="drop" id="drop-op"></div></div>
    <div class="hint">↵ Intro o , para añadir · toca × para eliminar</div>
  </div>

  <div class="fg">
    <label>Trabajo realizado</label>
    <textarea id="f-job" placeholder="Ej: Realización pozo V5, Encofrado muro norte..."></textarea>
  </div>

  <div class="fg">
    <label>Tipo de trabajo</label>
    <div class="tipo-sel">
      <div class="tipo-btn c" id="tb-c" onclick="setT('c')">✓ CONTRATO</div>
      <div class="tipo-btn" id="tb-h" onclick="setT('h')">⏱ POR HORA</div>
    </div>
  </div>

  <div class="hf" id="hf">
    <label>Horas trabajadas</label>
    <input type="number" id="f-hrs" placeholder="8" min="0" step="0.5">
  </div>

  <div class="fg" style="margin-top:16px">
    <label>Notas</label>
    <input type="text" id="f-note" placeholder="Opcional...">
  </div>

  <div class="btn-row">
    <button class="btn btn-s" onclick="clear_form()">LIMPIAR</button>
    <button class="btn btn-p" id="btn-save" onclick="save()">GUARDAR</button>
  </div>
  <button id="btn-del" onclick="del_row()">🗑 ELIMINAR ESTE REGISTRO</button>
  <div class="notif" id="notif-r"></div>
</div>
</main>
</div>

<!-- LISTA -->
<div class="panel" id="panel-lista">
<main>
  <div class="list-bar">
    <div class="list-title">Registros</div>
    <button class="btn-ref" onclick="loadList()">↻ Actualizar</button>
  </div>
  <div class="fbar">
    <input type="date" id="f-filt" onchange="onFilterChange()">
    <button class="fbtn on" id="fb-hoy" onclick="filterHoy()">HOY</button>
    <button class="fbtn" id="fb-all" onclick="filterAll()">TODOS</button>
  </div>
  <div class="rows" id="rows"><div class="loading">Cargando...</div></div>
</main>
</div>

<!-- GESTIÓN -->
<div class="panel" id="panel-gestion">
<main>
<div class="card">
  <h2>⚙️ Empresas y Operarios</h2>
  <div id="cat-wrap"><div class="loading">Cargando catálogo...</div></div>
  <button class="btn-newemp" onclick="toggleNewEmp()">+ AÑADIR NUEVA EMPRESA</button>
  <div id="new-emp" style="display:none;margin-top:12px;">
    <div class="add-row">
      <input type="text" id="new-emp-val" placeholder="Nombre de la empresa...">
      <button class="btn-add" onclick="saveEmp()">AÑADIR</button>
    </div>
  </div>
  <div class="ng" id="ng"></div>
</div>
</main>
</div>

<script>
const N8N = 'https://demon8n-n8n.cup5ta.easypanel.host/webhook';
const WH = {
  save:     N8N + '/diario-save',
  list:     N8N + '/diario-lista',
  del:      N8N + '/diario-eliminar',
  catList:  N8N + '/catalogo-lista',
  catSave:  N8N + '/catalogo-save',
  catDel:   N8N + '/catalogo-eliminar'
};

let tipo = 'c';
let chips = [];
let selRow = null;
let showAll = false;
let cat = [];

// CLOCK
setInterval(() => {
  const d = new Date();
  document.getElementById('clock').innerHTML =
    d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}).toUpperCase() +
    '<br>' + d.toTimeString().slice(0,5);
}, 1000);
(function(){
  const d = new Date();
  document.getElementById('clock').innerHTML =
    d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}).toUpperCase() +
    '<br>' + d.toTimeString().slice(0,5);
})();

// DATE UTILS
function toDate(s) {
  if (!s) return '';
  if (s.includes('/')) return s;
  const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`;
}
function toInput(s) {
  if (!s) return '';
  if (s.includes('-')) return s;
  const [d,m,y] = s.split('/'); return `${y}-${m}-${d}`;
}

// INIT
document.addEventListener('DOMContentLoaded', () => {
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('f-fecha').value = hoy;
  document.getElementById('f-filt').value = hoy;
  initTags();
  loadCat();
  document.addEventListener('click', e => {
    if (!e.target.closest('.drop-wrap') && !e.target.closest('.tags-wrap'))
      document.querySelectorAll('.drop').forEach(d => d.style.display = 'none');
  });
});

// TABS
function goTab(name) {
  ['registro','lista','gestion'].forEach(n => {
    document.getElementById('panel-' + n).classList.remove('on');
    document.getElementById('t-' + n.slice(0,3)).classList.remove('on');
  });
  document.getElementById('panel-' + name).classList.add('on');
  document.getElementById('t-' + name.slice(0,3)).classList.add('on');
}

// CATALOGO
async function loadCat() {
  try {
    const r = await fetch(WH.catList, {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    const d = await r.json();
    cat = Array.isArray(d) ? d : [];
  } catch(e) { cat = []; }
  renderCat();
}

// SUGGEST EMPRESA
function showEmpDrop(val) {
  const drop = document.getElementById('drop-emp');
  const list = [...new Set(cat.map(c => c.Empresa))]
    .filter(e => e && e.toLowerCase().includes(val.toLowerCase()));
  if (!list.length) { drop.style.display = 'none'; return; }
  drop.innerHTML = list.map(e =>
    `<div class="drop-item" onmousedown="pickEmp(${JSON.stringify(e)})">${e}</div>`
  ).join('');
  drop.style.display = 'block';
}
function pickEmp(e) {
  document.getElementById('f-emp').value = e;
  document.getElementById('drop-emp').style.display = 'none';
  showOpDrop('', e);
}

// TAGS
function initTags() {
  const inp = document.getElementById('tag-in');
  inp.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ',') && inp.value.trim()) {
      e.preventDefault();
      addChip(inp.value.replace(',','').trim());
      inp.value = '';
      document.getElementById('drop-op').style.display = 'none';
    } else if (e.key === 'Backspace' && !inp.value && chips.length) {
      removeChip(chips.length - 1);
    }
  });
  inp.addEventListener('input', () => showOpDrop(inp.value, document.getElementById('f-emp').value));
  inp.addEventListener('focus', () => showOpDrop(inp.value, document.getElementById('f-emp').value));
  inp.addEventListener('blur', () => setTimeout(() => {
    if (inp.value.trim()) { addChip(inp.value.trim()); inp.value = ''; }
    document.getElementById('drop-op').style.display = 'none';
  }, 150));
}

function showOpDrop(val, emp) {
  const drop = document.getElementById('drop-op');
  const list = cat
    .filter(c => (!emp || c.Empresa === emp) && !chips.includes(c.Operario))
    .map(c => c.Operario)
    .filter((o,i,a) => a.indexOf(o) === i)
    .filter(o => o && o.toLowerCase().includes(val.toLowerCase()));
  if (!list.length) { drop.style.display = 'none'; return; }
  drop.innerHTML = list.map(o =>
    `<div class="drop-item" onmousedown="pickOp(${JSON.stringify(o)})">👤 ${o}</div>`
  ).join('');
  drop.style.display = 'block';
}
function pickOp(o) {
  addChip(o);
  document.getElementById('tag-in').value = '';
  document.getElementById('drop-op').style.display = 'none';
  setTimeout(() => showOpDrop('', document.getElementById('f-emp').value), 100);
}
function addChip(nome) {
  if (!nome || chips.includes(nome)) return;
  chips.push(nome); renderChips();
}
function removeChip(i) { chips.splice(i, 1); renderChips(); }
function renderChips() {
  const wrap = document.getElementById('tags-wrap');
  const inp = document.getElementById('tag-in');
  wrap.innerHTML = '';
  chips.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'chip';
    el.innerHTML = `${c} <span class="x" onmousedown="removeChip(${i})">×</span>`;
    wrap.appendChild(el);
  });
  wrap.appendChild(inp);
}

// TIPO
function setT(t) {
  tipo = t;
  document.getElementById('tb-c').className = 'tipo-btn' + (t==='c' ? ' c' : '');
  document.getElementById('tb-h').className = 'tipo-btn' + (t==='h' ? ' h' : '');
  document.getElementById('hf').className = 'hf' + (t==='h' ? ' on' : '');
}

// SAVE
async function save() {
  const fecha = toDate(document.getElementById('f-fecha').value);
  const emp   = document.getElementById('f-emp').value.trim();
  const job   = document.getElementById('f-job').value.trim();
  const hrs   = document.getElementById('f-hrs').value;
  const note  = document.getElementById('f-note').value.trim();
  const tinp  = document.getElementById('tag-in');
  if (tinp.value.trim()) { addChip(tinp.value.trim()); tinp.value = ''; }

  if (!fecha)         { msg('⚠️ Fecha obligatoria','err'); return; }
  if (!emp)           { msg('⚠️ Empresa obligatoria','err'); return; }
  if (!chips.length)  { msg('⚠️ Añade al menos un trabajador','err'); return; }
  if (!job)           { msg('⚠️ Describe el trabajo realizado','err'); return; }
  if (tipo==='h' && !hrs) { msg('⚠️ Indica las horas trabajadas','err'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'GUARDANDO...';

  try {
    const r = await fetch(WH.save, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        Fecha: fecha, Empresa: emp,
        Trabajadores: chips.join(', '),
        'Trabajo Realizado': job,
        'Tipo (Contrato/Hora)': tipo==='c' ? 'Contrato' : 'Hora',
        Horas: tipo==='h' ? parseFloat(hrs) : '',
        Notas: note
      })
    });
    if (r.ok) { msg(`✅ Registrado — ${emp} · ${chips.join(', ')}`, 'ok'); clear_form(); }
    else throw new Error();
  } catch(e) { msg('❌ Error de conexión — verifica n8n', 'err'); }
  btn.disabled = false; btn.textContent = 'GUARDAR';
}

// CLEAR
function clear_form() {
  selRow = null;
  document.getElementById('btn-del').style.display = 'none';
  document.getElementById('f-emp').value = '';
  document.getElementById('f-job').value = '';
  document.getElementById('f-hrs').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
  chips = []; renderChips(); setT('c');
}

// MSG
function msg(txt, tipo) {
  const el = document.getElementById('notif-r');
  el.textContent = txt; el.className = 'notif ' + tipo;
  setTimeout(() => { el.className = 'notif'; }, 5000);
}

// DELETE
async function del_row() {
  if (!selRow) return;
  if (!confirm(`⚠️ Eliminar el registro de ${selRow.Empresa} del ${selRow.Fecha}?\n\nEsta acción no se puede deshacer.`)) return;
  const btn = document.getElementById('btn-del');
  btn.textContent = 'ELIMINANDO...';
  try {
    const r = await fetch(WH.del, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ Fecha: selRow.Fecha, Empresa: selRow.Empresa, Trabajadores: selRow.Trabajadores })
    });
    if (r.ok) { msg('✅ Registro eliminado correctamente', 'ok'); selRow = null; clear_form(); }
    else msg('❌ Error al eliminar — verifica n8n', 'err');
  } catch(e) { msg('❌ Error de conexión', 'err'); }
  btn.textContent = '🗑 ELIMINAR ESTE REGISTRO';
}

// FILL FORM from row
function fillForm(row) {
  selRow = row;
  document.getElementById('f-fecha').value = toInput(row.Fecha);
  document.getElementById('f-emp').value   = row.Empresa || '';
  document.getElementById('f-job').value   = row['Trabajo Realizado'] || '';
  document.getElementById('f-note').value  = row.Notas || '';
  chips = row.Trabajadores ? row.Trabajadores.split(',').map(s => s.trim()).filter(Boolean) : [];
  renderChips();
  const t = (row['Tipo (Contrato/Hora)'] || '').toLowerCase().includes('hora') ? 'h' : 'c';
  setT(t);
  if (t === 'h') document.getElementById('f-hrs').value = row.Horas || '';
  document.getElementById('btn-del').style.display = 'block';
  goTab('registro');
  window.scrollTo({top:0, behavior:'smooth'});
}

// FILTRI
function filterHoy() {
  showAll = false;
  document.getElementById('fb-hoy').classList.add('on');
  document.getElementById('fb-all').classList.remove('on');
  document.getElementById('f-filt').value = new Date().toISOString().split('T')[0];
  loadList();
}
function filterAll() {
  showAll = true;
  document.getElementById('fb-all').classList.add('on');
  document.getElementById('fb-hoy').classList.remove('on');
  loadList();
}
function onFilterChange() {
  showAll = false;
  document.getElementById('fb-hoy').classList.remove('on');
  document.getElementById('fb-all').classList.remove('on');
  loadList();
}

// LOAD LIST
async function loadList() {
  const wrap = document.getElementById('rows');
  wrap.innerHTML = '<div class="loading">Cargando...</div>';
  const fecha = showAll ? '' : toDate(document.getElementById('f-filt').value);
  try {
    const r = await fetch(WH.list, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ fecha })
    });
    const data = await r.json();
    renderList(Array.isArray(data) ? data : []);
  } catch(e) {
    wrap.innerHTML = '<div class="empty">⚠️ No se puede conectar con n8n<br>Verifica que el webhook esté activo</div>';
  }
}

function renderList(rows) {
  const wrap = document.getElementById('rows');
  if (!rows.length) { wrap.innerHTML = '<div class="empty">Sin registros para esta fecha</div>'; return; }
  wrap.innerHTML = '';
  rows.forEach(row => {
    const t = (row['Tipo (Contrato/Hora)'] || '').toLowerCase().includes('hora') ? 'h' : 'c';
    const ops = row.Trabajadores ? row.Trabajadores.split(',').map(s => s.trim()) : [];
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `
      <div class="row-top">
        <div class="row-emp">${row.Empresa || '—'}</div>
        <div class="row-date">${row.Fecha || ''}</div>
      </div>
      <div class="row-job">${row['Trabajo Realizado'] || '—'}</div>
      <div class="row-tags">
        <span class="rtag ${t==='h' ? 'rtag-h':'rtag-c'}">${t==='h' ? `⏱ ${row.Horas||'?'}h`:'✓ CONTRATO'}</span>
        ${ops.map(o => `<span class="rtag rtag-o">👤 ${o}</span>`).join('')}
      </div>
      ${row.Notas ? `<div class="row-note">📝 ${row.Notas}</div>` : ''}
    `;
    div.addEventListener('click', () => fillForm(row));
    wrap.appendChild(div);
  });
}

// CATALOGO RENDER
function renderCat() {
  const wrap = document.getElementById('cat-wrap');
  const emps = [...new Set(cat.map(c => c.Empresa))];
  if (!emps.length) { wrap.innerHTML = '<div class="empty">No hay empresas. ¡Añade una!</div>'; return; }
  wrap.innerHTML = '';
  emps.forEach(emp => {
    const ops = cat.filter(c => c.Empresa === emp);
    const id = 'e' + emp.replace(/[^a-zA-Z0-9]/g, '');
    const card = document.createElement('div');
    card.className = 'emp-card';
    card.innerHTML = `
      <div class="emp-head">
        <div class="emp-name">${emp}</div>
        <div class="emp-cnt">${ops.length} operario/s</div>
      </div>
      <div class="emp-body" id="body-${id}">
        ${ops.map(o => `
          <div class="op-chip">${o.Operario}
            <span class="op-x" data-emp="${emp}" data-op="${o.Operario}">×</span>
          </div>`).join('')}
        <div class="add-row" style="width:100%">
          <input type="text" id="inp-${id}" placeholder="Nuevo operario...">
          <button class="btn-add" data-emp="${emp}" data-id="${id}">+</button>
        </div>
      </div>
    `;
    wrap.appendChild(card);

    // Event listeners
    card.querySelectorAll('.op-x').forEach(btn => {
      btn.addEventListener('click', () => delOp(btn.dataset.emp, btn.dataset.op));
    });
    card.querySelector('.btn-add').addEventListener('click', e => {
      addOp(e.target.dataset.emp, e.target.dataset.id);
    });
    card.querySelector(`#inp-${id}`).addEventListener('keydown', e => {
      if (e.key === 'Enter') addOp(emp, id);
    });
  });
}

async function addOp(emp, id) {
  const inp = document.getElementById('inp-' + id);
  const nome = inp.value.trim();
  if (!nome) return;
  try {
    await fetch(WH.catSave, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({Empresa:emp, Operario:nome}) });
    cat.push({Empresa:emp, Operario:nome});
    renderCat();
    notifG(`✅ ${nome} añadido a ${emp}`, 'ok');
  } catch(e) { notifG('❌ Error de conexión', 'err'); }
}

async function delOp(emp, op) {
  if (!confirm(`¿Eliminar ${op} de ${emp}?`)) return;
  try {
    await fetch(WH.catDel, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({Empresa:emp, Operario:op}) });
    cat = cat.filter(c => !(c.Empresa===emp && c.Operario===op));
    renderCat();
    notifG(`✅ ${op} eliminado`, 'ok');
  } catch(e) { notifG('❌ Error', 'err'); }
}

function toggleNewEmp() {
  const f = document.getElementById('new-emp');
  f.style.display = f.style.display === 'block' ? 'none' : 'block';
}

async function saveEmp() {
  const nome = document.getElementById('new-emp-val').value.trim();
  if (!nome) return;
  const op = prompt(`Primer operario de "${nome}" (obligatorio):`);
  if (!op) return;
  try {
    await fetch(WH.catSave, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({Empresa:nome, Operario:op}) });
    cat.push({Empresa:nome, Operario:op});
    document.getElementById('new-emp-val').value = '';
    document.getElementById('new-emp').style.display = 'none';
    renderCat();
    notifG(`✅ Empresa "${nome}" añadida`, 'ok');
  } catch(e) { notifG('❌ Error de conexión', 'err'); }
}

function notifG(txt, t) {
  const el = document.getElementById('ng');
  el.textContent = txt; el.className = 'ng ' + t;
  setTimeout(() => { el.className = 'ng'; }, 5000);
}
</script>
